<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Video Player</title>
    <style>
        video { display: block; margin-top: 20px; max-width: 100%; }
    </style>
</head>
<body>
     <header class="hero">
  <img src="logomerahmuda.jpg" alt="Logo ALFA" class="logo">
  <h1>Mas Gondrong</h1>
  <p>Mini Player Musik & Video</p>
  <p>💖WELCOME TO BATAM💖</p>
     </header>
    
    <h1>Video Saya</h1>
    <h1>Musik Saya</h1>
    <input type="file" id="videoUploader" accept="video/*">

    <!-- Gunakan src langsung pada tag video -->
    <video id="videoPlayer" controls src="amin.mp4" width="640">
        Browser Anda tidak mendukung video.
    </video>

    <script>
        const videoUploader = document.getElementById('videoUploader');
        const videoPlayer = document.getElementById('videoPlayer');

        videoUploader.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                // Mengganti src video yang sedang diputar
                videoPlayer.src = fileURL; 
                videoPlayer.play();
            }
        });
    </script>
</body>
</html>
